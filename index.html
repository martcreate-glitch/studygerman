<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>초급 단어장 | German & English</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">Word Notebook</p>
      <h1>초급 단어장</h1>
      <p class="subtitle">언어별로 단어를 외우며 기초를 다지는 단어장</p>
    </header>

    <section class="controls" aria-label="단어장 제어">
      <div class="control-group">
        <span class="label">언어</span>
        <div class="chips" id="language-chips">
          <button class="chip active" data-lang="english">영어</button>
          <button class="chip" data-lang="german">독일어</button>
        </div>
      </div>

      <div class="control-group search-group">
        <label class="label" for="search-input">검색</label>
        <input id="search-input" type="text" placeholder="단어 또는 뜻 검색 (예: house, 집)">
      </div>

      <div class="control-group">
        <span class="label">품사</span>
        <div class="chips" id="type-chips">
          <button class="chip active" data-type="all">전체</button>
          <button class="chip" data-type="noun">명사</button>
          <button class="chip" data-type="verb">동사</button>
          <button class="chip" data-type="adjective">형용사</button>
          <button class="chip" data-type="expression">표현</button>
        </div>
      </div>
    </section>

    <section class="summary" aria-live="polite">
      <strong id="count-text">총 0개</strong>
      <span id="current-language">영어 A1 단어장</span>
    </section>

    <section class="flashcard-wrap">
      <article id="flashcard" class="flashcard" aria-label="단어 카드">
        <p id="card-type" class="card-type">명사</p>
        <h2 id="card-word" class="card-word">-</h2>
        <p id="card-meaning" class="card-meaning" hidden>-</p>
        <p class="hint">카드를 터치하거나 눌러 뜻 보기</p>
      </article>

      <div class="card-actions">
        <button id="prev-btn" class="nav-btn" type="button">이전</button>
        <button id="reveal-btn" class="nav-btn primary" type="button">뜻 보기</button>
        <button id="next-btn" class="nav-btn" type="button">다음</button>
      </div>

      <p class="gesture-hint">모바일: 카드를 좌우로 밀어 넘기기</p>
      <p id="empty-state" class="empty-state" hidden>조건에 맞는 단어가 없습니다.</p>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
